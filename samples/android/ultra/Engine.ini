[/Script/Engine.RendererSettings]
; WuWa General Android Ultra V2
; Lessons from Moto G40 logs:
; - MobileHDR must stay ON. MobileHDR=0 can crash due to missing LDR shader path.
; - SystemSettings has high priority.
; - No active Scalability.ini in this pack.
; - Performance Safe uses OpenGL-safe mode; Balanced/High/Ultra try Vulkan first.

r.Android.DisableVulkanSupport=0
r.OpenHarmony.DisableVulkanSupport=0
r.MobileHDR=1
r.AllowHDR=1
r.DynamicRes.OperationMode=0

r.DefaultFeature.AntiAliasing=2
r.PostProcessAAQuality=4
r.TemporalAASamples=4
r.TemporalAACurrentFrameWeight=0.25
r.TemporalAAFilterSize=0.25
r.Tonemapper.Sharpen=0.40

r.DefaultFeature.MotionBlur=0
r.MotionBlurQuality=0
r.DefaultFeature.Bloom=1
r.BloomQuality=2
r.DefaultFeature.AmbientOcclusion=1
r.AmbientOcclusionLevels=1
r.Mobile.AmbientOcclusion=1
r.DefaultFeature.LensFlare=0
r.LensFlareQuality=0
r.DepthOfFieldQuality=1
r.SceneColorFringeQuality=0
r.EyeAdaptationQuality=0
r.DefaultFeature.AutoExposure=0

r.ShadowQuality=3
r.Shadow.CSM.MaxMobileCascades=3
r.Shadow.MaxResolution=1024
r.Shadow.MaxCSMResolution=1024
r.Shadow.DistanceScale=0.85
r.Shadow.RadiusThreshold=0.12
r.Mobile.EnableStaticAndCSMShadowReceivers=1
r.Mobile.AllowMovableDirectionalLights=1
r.Mobile.EnableMovableSpotlights=1
r.Mobile.EnableKuroSpotlightsShadow=1
r.MobileNumDynamicPointLights=2

r.Mobile.EnableWaterReflection=1
r.ReflectionCaptureResolution=128
r.ReflectionEnvironment=1
r.SSR.Quality=1
r.Mobile.SceneObjMobileSSR=1
r.RefractionQuality=1
r.VolumetricFog=0
r.VolumetricCloud=1
r.Fog=1

r.TextureStreaming=1
r.Streaming.PoolSize=1000
r.Streaming.PoolSizeForMeshes=700
r.Streaming.MipBias=0
r.Streaming.DefragDynamicBounds=1
r.Streaming.FramesForFullUpdate=15
r.Streaming.HiddenPrimitiveScale=0.5
r.MaxAnisotropy=4

FX.AllowGPUParticles=1
