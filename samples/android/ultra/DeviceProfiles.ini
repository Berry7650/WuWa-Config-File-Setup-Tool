; WuWa General Android Ultra DeviceProfiles.ini
; Each preset defines only its own base tier.
; MobileHDR remains ON for crash safety.
; This file intentionally keeps CVars cleaner than older versions.

[Android_VeryHigh DeviceProfile]
DeviceType=Android
BaseProfileName=Android
+CVars=sg.ViewDistanceQuality=3
+CVars=sg.AntiAliasingQuality=3
+CVars=sg.ShadowQuality=3
+CVars=sg.PostProcessQuality=2
+CVars=sg.TextureQuality=3
+CVars=sg.EffectsQuality=3
+CVars=sg.FoliageQuality=3
+CVars=sg.ShadingQuality=3

[Android_Default DeviceProfile]
DeviceType=Android
BaseProfileName=Android_VeryHigh
+CVars=r.Android.DisableVulkanSupport=0
+CVars=r.OpenHarmony.DisableVulkanSupport=0
+CVars=r.MobileHDR=1
+CVars=r.AllowHDR=1
+CVars=r.PostProcessAAQuality=4
+CVars=r.TemporalAASamples=4
+CVars=r.TemporalAACurrentFrameWeight=0.25
+CVars=r.TemporalAAFilterSize=0.25
+CVars=r.Tonemapper.Sharpen=0.40
+CVars=r.ShadowQuality=3
+CVars=r.Shadow.CSM.MaxMobileCascades=3
+CVars=r.Shadow.MaxResolution=1024
+CVars=r.Mobile.EnableWaterReflection=1
+CVars=r.DefaultFeature.MotionBlur=0
+CVars=r.DefaultFeature.Bloom=1
+CVars=r.DefaultFeature.AmbientOcclusion=1
+CVars=FX.AllowGPUParticles=1
+CVars=fx.KuroUseGPUParticles=1
+CVars=fx.NiagaraAllowGPUParticles=1
+CVars=fx.NiagaraAllowComputeShaders=1
+CVars=r.ViewDistanceScale=1.15
+CVars=r.StaticMeshLODDistanceScale=0.85
+CVars=r.SkeletalMeshLODBias=0
+CVars=foliage.DensityScale=0.85
+CVars=grass.DensityScale=0.70
+CVars=r.EmitterSpawnRateScale=1.00
+CVars=r.Streaming.MipBias=0
+CVars=r.MaxAnisotropy=4

