; WuWa General Android Performance Safe DeviceProfiles.ini
; Each preset defines only its own base tier.
; MobileHDR remains ON for crash safety.
; This file intentionally keeps CVars cleaner than older versions.

[Android_Lowest DeviceProfile]
DeviceType=Android
BaseProfileName=Android
+CVars=sg.ViewDistanceQuality=0
+CVars=sg.AntiAliasingQuality=1
+CVars=sg.ShadowQuality=0
+CVars=sg.PostProcessQuality=0
+CVars=sg.TextureQuality=0
+CVars=sg.EffectsQuality=0
+CVars=sg.FoliageQuality=0
+CVars=sg.ShadingQuality=0

[Android_Default DeviceProfile]
DeviceType=Android
BaseProfileName=Android_Lowest
+CVars=r.Android.DisableVulkanSupport=1
+CVars=r.OpenHarmony.DisableVulkanSupport=1
+CVars=r.MobileHDR=1
+CVars=r.AllowHDR=1
+CVars=r.PostProcessAAQuality=1
+CVars=r.TemporalAASamples=2
+CVars=r.TemporalAACurrentFrameWeight=0.42
+CVars=r.TemporalAAFilterSize=0.60
+CVars=r.Tonemapper.Sharpen=0.18
+CVars=r.ShadowQuality=0
+CVars=r.Shadow.CSM.MaxMobileCascades=1
+CVars=r.Shadow.MaxResolution=256
+CVars=r.Mobile.EnableWaterReflection=0
+CVars=r.DefaultFeature.MotionBlur=0
+CVars=r.DefaultFeature.Bloom=0
+CVars=r.DefaultFeature.AmbientOcclusion=0
+CVars=FX.AllowGPUParticles=0
+CVars=fx.KuroUseGPUParticles=0
+CVars=fx.NiagaraAllowGPUParticles=0
+CVars=fx.NiagaraAllowComputeShaders=0
+CVars=r.ViewDistanceScale=0.55
+CVars=r.StaticMeshLODDistanceScale=1.90
+CVars=r.SkeletalMeshLODBias=1
+CVars=foliage.DensityScale=0.06
+CVars=grass.DensityScale=0.03
+CVars=r.EmitterSpawnRateScale=0.15
+CVars=r.Streaming.MipBias=2
+CVars=r.MaxAnisotropy=1

