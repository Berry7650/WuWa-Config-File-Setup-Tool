; WuWa General Android High DeviceProfiles.ini
; Each preset defines only its own base tier.
; MobileHDR remains ON for crash safety.
; This file intentionally keeps CVars cleaner than older versions.

[Android_High DeviceProfile]
DeviceType=Android
BaseProfileName=Android
+CVars=sg.ViewDistanceQuality=2
+CVars=sg.AntiAliasingQuality=2
+CVars=sg.ShadowQuality=2
+CVars=sg.PostProcessQuality=1
+CVars=sg.TextureQuality=2
+CVars=sg.EffectsQuality=2
+CVars=sg.FoliageQuality=2
+CVars=sg.ShadingQuality=2

[Android_Default DeviceProfile]
DeviceType=Android
BaseProfileName=Android_High
+CVars=r.Android.DisableVulkanSupport=0
+CVars=r.OpenHarmony.DisableVulkanSupport=0
+CVars=r.MobileHDR=1
+CVars=r.AllowHDR=1
+CVars=r.PostProcessAAQuality=3
+CVars=r.TemporalAASamples=4
+CVars=r.TemporalAACurrentFrameWeight=0.30
+CVars=r.TemporalAAFilterSize=0.35
+CVars=r.Tonemapper.Sharpen=0.30
+CVars=r.ShadowQuality=2
+CVars=r.Shadow.CSM.MaxMobileCascades=2
+CVars=r.Shadow.MaxResolution=1024
+CVars=r.Mobile.EnableWaterReflection=0
+CVars=r.DefaultFeature.MotionBlur=0
+CVars=r.DefaultFeature.Bloom=1
+CVars=r.DefaultFeature.AmbientOcclusion=0
+CVars=FX.AllowGPUParticles=0
+CVars=fx.KuroUseGPUParticles=0
+CVars=fx.NiagaraAllowGPUParticles=0
+CVars=fx.NiagaraAllowComputeShaders=0
+CVars=r.ViewDistanceScale=0.95
+CVars=r.StaticMeshLODDistanceScale=1.00
+CVars=r.SkeletalMeshLODBias=0
+CVars=foliage.DensityScale=0.55
+CVars=grass.DensityScale=0.42
+CVars=r.EmitterSpawnRateScale=0.65
+CVars=r.Streaming.MipBias=0
+CVars=r.MaxAnisotropy=2

